name: class_champion
description: "Class Champion Learning Platform"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  get: ^4.7.3

  # Network
  dio: ^5.9.2
  web_socket_channel: ^3.0.3

  # Storage
  shared_preferences: ^2.5.3

  # UI
  google_fonts: ^6.3.2
  shimmer: ^3.0.0
  lottie: ^3.3.1
  font_awesome_flutter: ^11.0.0
  fluttertoast: ^9.0.0
  firebase_core: ^4.9.0

  # Image
  cached_network_image: ^3.4.1
  transparent_image: ^2.0.0

  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.1.10
  file_picker: ^11.0.2
  share_plus: ^12.0.1

  # Maps & Location
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  flutter_map: ^8.3.0
  google_maps_flutter: ^2.5.0
  latlong2: ^0.9.1

  # OTP
  sms_autofill: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/image/
